name: Chromatic

on:
  push:
    branches: [master]
  pull_request:

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Chromatic needs full git history to compare against baselines
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.4
          cache: npm

      - run: npm ci

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # Storybook interaction tests already run in `npm test`; this job is
          # for the hosted Storybook + visual snapshots.
          exitZeroOnChanges: true
